      ### Screen Reader Access

      Provides information regarding access to different Screen Readers.

      ISRO fully complies with [Guidelines for Indian Government Websites](http://web.guidelines.gov.in/). Our visitors with visual impairments can access the Portal using Assistive Technologies, such as screen readers.

      The information of the Portal is accessible with different screen readers, such as JAWS, NVDA, SAFA, Supernova and Window-Eyes.

