- seo:
    title: "Spacecraft"

  jumbotronImg:
    - image: "../images/spacecraft/chandrayaan2.jpeg"
      title: "Indian Spacecraft"
      subtitle: ""
      description: ""
      button: ""
      link: ""
      horizontalPosition: "center"
      verticalPosition: "center"
      textAlignment: "center"

  splitSection:
    - title: "Communication Satellites"
      subtitle: ""
      description: "Supports telecommunication, television broadcasting, satellite news gathering, societal applications, weather forecasting, disaster warning and Search and Rescue operation services."
      image: "../images/spacecraft/comm_sat.jpg"
      button: "LEARN MORE"
      link: "/spacecraft/communication-satellites"
      textPosition: "left"
      textAlignment: "center"
      objectFit: "cover"


    - title: "Earth Observation Satellites"
      description: "The largest civilian remote sensing satellite constellation in the world - thematic series of satellites supporting multitude of applications in the areas of land and water resources; cartography; and ocean & atmosphere."
      image: "../images/spacecraft/earth_obs_sat.jpg"
      button: "LEARN MORE"
      link: "/spacecraft/earth-observation-satellites"
      textPosition: "right"
      textAlignment: "center"
      objectFit: "cover"

    - title: "Scientific Spacecraft"
      description: "Spacecraft for research in areas like astronomy, astrophysics, planetary and earth sciences, atmospheric sciences and theoretical physics."
      image: "../images/spacecraft/scientific_spacecraft.jpg"
      button: "LEARN MORE"
      link: "/spacecraft/space-science-exploration"
      textPosition: "left"
      textAlignment: "center"
      objectFit: "cover"

    - title: "Navigation Satellites"
      description: "Satellites for navigation services to meet the emerging demands of the Civil Aviation requirements and to meet the user requirements of the positioning, navigation and timing based on the independent satellite navigation system."
      image: "../images/spacecraft/nav_sat.jpg"
      button: "LEARN MORE"
      link: "/spacecraft/satellite-navigation"
      textPosition: "right"
      textAlignment: "center"
      objectFit: "cover"



  cardSection:
    - title: "Experimental Satellites"
      subtitle: ""
      text: "A host of small satellites mainly for the experimental purposes. These experiments include Remote Sensing, Atmospheric Studies, Payload Development, Orbit Controls, recovery technology etc."
      image: "../images/spacecraft/experimental_sat1.jpg"
      link: "/spacecraft/experimental-satellites"

    - title: "Small Satellites"
      subtitle: ""
      text: "Sub 500 kg class satellites - a platform for stand-alone payloads for earth imaging and science missions within a quick turn around time."
      image: "../images/spacecraft/small_sat.jpeg"
      link: "/spacecraft/small-satellites"

    - title: "Student Satellites"
      subtitle: ""
      text: "ISRO's Student Satellite programme is envisaged to encourage various Universities and Institutions for the development of Nano/Pico Satellites."
      image: "../images/spacecraft/student_sat.jpeg"
      link: "/spacecraft/university-academic-institute-satellites"


