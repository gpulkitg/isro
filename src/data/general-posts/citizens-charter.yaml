      We, The Public Servants Of India Do Hereby Solemnly Pledge That We Shall Continuously Strive To Bring About Integrity and Trtextparency In All Spheres Of Our Activities. We also Pledge that we shall work unstintingly for eradication of corruption in all spheres of life. We shall remain vigilant and work towards the growth and reputation of organisation in all spheres of Life. Through our collective efforts, We shall bring Pride to our organisations and Provide value based service to our Country Men. We shall do our Duty Conscientiously and Act without Fear Or Favour.

