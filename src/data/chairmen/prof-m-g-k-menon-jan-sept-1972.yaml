about: !markdown |
  Prof. M G K Menon (28 August 1928 - 22 November 2016), was an Advisor in the Department of Space/ Indian Space Research Organization (ISRO).

  He was the President of Indian Statistical Institute, Calcutta (1990- 2016).

  Prof. Menon took his Ph.D. from the University of Bristol, UK in 1953, He has a large number of honorary doctorates from universities in India and abroad.

  Prof. Menon was Fellow of all the three Science Academies in India; and was President of each one of them.

  Prof. Menon has done Scientific Work in Cosmic Rays, Particle Physics.

  Distinguished for investigations in the field of cosmic ray studies and in particular on the high-energy inter-actions of elementary particles.


biodata: !markdown |
  #### Education
    - Bachelor of Sciences from Jaswant College, Jodhpur, India 1946
    - MSc. from Royal Institute of Science, India 1949
    - Ph.D. from Univ. of Bristol, UK 1960
    - Post Doctoral Research 1955

  #### Date of birth

  28 August 1928, Mangalore, Karnataka, India

  #### National Recognition
    - Padma Shri in 1961
    - Padma Bhushan in 1968
    - Padma Vibhushan in 1985


  #### Professional Activities
    - Scientific Work in Cosmic Rays, Particle Physics
    - Distinguished for investigations in the field of cosmic ray studies and in particular on the high-energy inter-actions of elementary particles.


  Prof. M G K Menon died on November 22, 2016 at New Delhi


