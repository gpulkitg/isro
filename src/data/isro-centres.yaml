      description: !markdown |
        ISRO Inertial Systems Unit (IISU), Thiruvananthapuram is responsible for the design and development of Inertial Systems for Launch Vehicles and Spacecraft programmes of ISRO. Major systems like Inertial Navigation Systems based on mechanical gyros and optical gyros, Attitude Reference Systems, Rate Gyro Packages and Accelerometer Packages are developed indigenously and used in various missions of ISRO. IISU also designs and develops Actuators and Mechanisms for spacecraft and allied applications.

        IISU is engaged in continuous Research and Development too. The experience and knowledge gained over the years are used for perfecting the present class of sensors and systems and developing new technologies. Further IISU has also initiated advanced technology development programs in niche areas to adapt itself as a Centre of Excellence in Inertial Sensors and Systems. IISU strives to make the systems cost effective, reliable and realisable in tune with global trends.



- title: "Laboratory for Electro-Optics Systems (LEOS)"
  slug: "/about/laboratory-electro-optics-systems-leos"
  image: "../images/about/centres/leos.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/centres/leos.jpg"
      headPosition: "Director"
      head: "Shri A. S. Laxmi Prasad"
      address: "Laboratory for Electro-Optics Systems (LEOS), First Cross, First Phase, Peenya Industrial Estate, Bengaluru – 560 058"
      email: "directorleos@leos.gov.in"
      link: ""
      description: !markdown |
        The Laboratory for Electro-Optics Systems (LEOS), Bengaluru is responsible for design, development and production of electro-optic sensors and optics for spacecraft use. Sensor system includes earth sensors, star sensors, sun sensors, magnetic sensors, fiber optic gyro, temperature sensors and processing electronics. Optics system includes optics for remote sensing cameras, radiometers, star sensor optics, optical filter, optical masks, optical coatings, IR detectors and MEMS based inclinometer.

        LEOS is actively involved in the development of new technologies for present / future satellites. This includes development active pixel sensor star tracker, Charge Coupled Device (CCD) based star tracker, Fiber Optics Gyro, Optical inter satellite link, high resolution camera optics, optical coatings and MEMS devices (magnetometer, accelerometer etc.).

        LEOS is situated at Peenya Industrial Estate, Bengaluru where the first Indian Satellite Aryabhata was fabricated in 1975.


