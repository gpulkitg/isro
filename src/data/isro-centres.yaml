      email: "mail@antrix.co.in"
      link: "http://www.antrix.co.in/"
      description: !markdown |
        Antrix Corporation Limited (ACL), Bengaluru is a wholly owned Government of India Company under the administrative control of the Department of Space. Antrix Corporation Limited was incorporated as a private limited company owned by Government of India in September 1992 as a Marketing arm of ISRO for promotion and commercial exploitation of space products, technical consultancy services and transfer of technologies developed by ISRO. Another major objective is to facilitate development of space related industrial capabilities in India.

        As the commercial and marketing arm of ISRO, Antrix is engaged in providing Space products and  services to international customers worldwide. With fully equipped state-of-the-art facilities, Antrix provides end-to-end solution for many of the space products, ranging from supply of hardware and software including simple subsystems to a complex spacecraft, for varied applications covering communications, earth observation and scientific missions; space related services including remote sensing data service, Transponder lease service; Launch services through the operational launch vehicles (PSLV and GSLV); Mission support services; and a host of consultancy and training services.



- title: "NewSpace India Limited (NSIL)"
  slug: "/about/newspace-india-limited-nsil"
  image: "../images/about/centres/nsil.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/centres/nsil.jpg"
      headPosition: "Chairman-cum-Managing Director"
      head: "Mr. G. Narayanan"
      address: "NewSpace India Limited (NSIL), ISRO HQ Campus, New BEL Road, Bengaluru - 560 231"
      email: "contact-nsil@isro.gov.in"
      link: ""
      description: !markdown |
        NewSpace India Limited (NSIL), incorporated on 6 March 2019 (under the Companies Act, 2013) is a wholly owned Government of India company, under the administrative control of Department of Space (DOS).  NSIL is the commercial arm of Indian Space Research Organisation (ISRO) with the primary responsibility of enabling Indian industries to take up high technology space related activities and is also responsible for promotion and commercial exploitation of the products and services emanating from the Indian space programme.  To satisfy the needs of its customers, NSIL draws upon the proven heritage of the Indian Space Program and ISRO’s vast experience in diverse branches of Space Technology.

        The major business areas of NSIL include:
          - Production of Polar Satellite Launch Vehicle (PSLV) and Small Satellite Launch Vehicle (SSLV) through industry
          - Production and marketing of space-based services, including launch services and space-based applications like transponder leasing, remote sensing and mission support services
          - Building of Satellites (both Communication and Earth Observation) as per user requirements
          - Transfer of technology developed by ISRO centres/ units and constituent institutions of Dept. of Space
          - Marketing spin off technologies and products/ services emanating out of ISRO activities
          - Consultancy services



