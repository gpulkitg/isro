        LPSC, Valaimala is responsible for R&D, System Design I Engineering and Project Management functions. The Fluid Control Components Entity and the Materials and Manufacturing Entities are located here apart  from the Earth Storable and Cryogenic  Propulsion Entities, handling  the core  tasks of the Centre.

