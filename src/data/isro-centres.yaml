        LPSC, Bengaluru is responsible for design and realisation of propulsion systems for remote sensing and communication satellites and other scientific missions. Development and production of transducers and sensors are all undertaken here.



- title: "Satish  Dhawan  Space  Centre  (SDSC)"
  slug: "/about/satish-dhawan-space-centre-sdsc-shar"
  image: "../images/about/centres/SHAR-Building.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/centres/SHAR-Building.jpg"
      headPosition: "Director"
      head: "Shri A Rajarajan"
      address: "Satish Dhawan Space Centre (SDSC), SHAR, Sriharikota Range PO - 524 124, Nellore District, Andhra Pradesh"
      email: "director@shar.gov.in"
      link: "http://www.shar.gov.in/"
      description: !markdown |
        Satish  Dhawan  Space  Centre  (SDSC)  SHAR,  Sriharikota, the  Spaceport  of  India,  is  responsible  for providing  Launch  Base  Infrastructure  for the  Indian  Space Programme. This  Centre has  the  facilities for  solid propellant  processing,  static  testing  of  solid  motors,  launch  vehicle  integration  and  launch operations, range operations comprising telemetry, tracking and command network and mission control centre.

        The Centre has two launch pads from where the rocket launching operations of PSLV and GSLV are carried out. The mandate for the centre is (i) to produce solid propellant boosters for the launch vehicle programmes of ISRO (ii) to provide the infrastructure for qualifying various subsystems and solid rocket motors and carrying out the necessary tests (iii) to provide launch base infrastructure for satellites and launch vehicles.

        SDSC SHAR has a separate launch pad for launching sounding rockets. The centre also provides the necessary  launch base  infrastructure for sounding rockets of  ISRO and  for assembly, integration and launch of sounding rockets and payloads.



- title: "U R Rao Satellite Centre (URSC)"
  slug: "/about/u-r-rao-satellite-centre-ursc"
  image: "../images/about/centres/ursc.png"
  description: ""
  locations:
    - name: ""
      image: "../images/about/centres/ursc.png"
      headPosition: "Director"
      head: "Mr. P. Kunhikrishnan"
      address: "U R Rao Satellite Centre (URSC), Old Airport Road, Vimanapura Post, Bengaluru - 560 017, Karnataka, India"
      email: "directoroffice@isac.gov.in"
      link: "http://www.isac.gov.in/"
      description: !markdown |
        U R Rao Satellite Centre (URSC), Bengaluru, formerly known as ISRO Satellite Centre (ISAC) is the lead centre for building satellites and developing associated satellite technologies. These spacecraft are used for providing applications to various users in the area of Communication, Navigation, Meteorology, Remote Sensing, Space Science and interplanetary explorations. The Centre is also pursuing advanced technologies for future missions. URSC is housed with the state-of-the-art facilities for building satellites on end-to-end basis. ISRO Satellite Integration and Test Establishment  (ISITE) is  equipped  with  state-of-the-art  clean  room  facilities  for spacecraft integration and test facilities including a 6.5 Metre thermo vacuum chamber, 29 Ton vibration facility, Compact Antenna Test Facility and  acoustic test facility under one roof. Assembly, Integration and Testing of all Communication and Navigation Spacecraft is carried out at ISITE. A dedicated facility for the productionisation of standardised subsystems is established at ISITE.

        URSC has a unit called Laboratory for Electro Optics System (LEOS), which is situated in Peenya, Bengaluru and is mainly responsible for research, development and productionisation of Sensors for ISRO programmes.

        Since inception, URSC has the distinction of building more than 100 satellites for various applications like scientific, communication, Navigation and remote sensing. Many private and public sector industries are also supporting ISAC in realising standard satellite hardware.



- title: "ISRO Propulsion Complex (IPRC)"
  slug: "/about/isro-propulsion-complex-iprc"
  image: "../images/about/centres/iprc1.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/centres/iprc1.jpg"
      headPosition: "Director"
      head: "Mr. K Alaguvelu"
      address: "ISRO Propulsion Complex, ISRO, Department of Space, Mahendragiri, Tirunelveli District, Tamil Nadu - 627 133"
      email: "director@iprc.gov.in"
      link: "http://www.iprc.gov.in/"
      description: !markdown |
        ISRO Propulsion Complex (IPRC), Mahendragiri is equipped with the state-of-the-art facilities necessary for realising the cutting edge propulsion technology products for the Indian space programme. Formerly, IPRC was known as LPSC, Mahendragiri and taking cognizance of the future growth of the space program of our nation and the concomitant expansion at Mahendragiri, it was elevated as IPRC with effect from February 01, 2014.

        The activities carried out at IPRC, Mahendragiri are: assembly, integration and testing of earth storable propellant engines, cryogenic engines and stages for launch vehicles; high altitude testing of upper stage engines and spacecraft thrusters as well as testing of its sub systems; production and supply of cryogenic propellants for Indian cryogenic rocket programme, etc. A Semi-cryogenic Cold Flow Test facility (SCFT) has been established at IPRC, Mahendragiri for the development, qualification and acceptance testing of semicryogenic engine subsystems.

        IPRC is responsible for the supply of Storable Liquid Propellants for ISRO’s launch vehicles and satellite programmes. IPRC delivers quality products to meet the zero defect demand of ISRO space programme ensuring high standards of safety and reliability. It also carries out Research & Development (R&D) and Technology Development Programmes (TDP) towards continued improvement of its contribution to the Indian space programme.



- title: "Space Applications Centre (SAC)"
  slug: "/about/space-applications-centre-sac"
  image: "../images/about/centres/sac.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/centres/"
      headPosition: "Director"
      head: "Shri D K Das"
      address: "Space Applications Centre, Jodhpur Tekra, Ambawadi Vistar P.O., Ahmedabad - 380015"
      email: "director@sac.isro.gov.in"
      link: "http://www.sac.gov.in/"
      description: !markdown |
        Space Applications Centre (SAC) at Ahmedabad is spread across two campuses having multi-disciplinary activities. The core competence of the Centre lies in  development of space borne and air borne instruments / payloads and their applications for national development and societal benefits. These applications are in diverse areas and primarily meet the communication, navigation and remote sensing needs of the country. Besides these, the Centre also contributed significantly in scientific and planetary missions of ISRO like Chandrayaan-1, Mars Orbiter Mission, etc. The communication transponders developed at this Centre for Indian National Satellite (INSAT) and Geo Synchronous Satellite (GSAT) series of satellites are used by government and private sector for VSAT, DTH, Internet, broadcasting, telephones etc.

        Main Engine and Stage Test Facility at IPRC This centre also designs and develops the optical and microware sensors for the satellites, signal and image processing software, GIS software and many applications for Earth Observation (EO) programme of ISRO. These applications are in diverse areas of Geosciences, Agriculture, Environment and Climate Change, Physical Oceanography, Biological Oceanography, Atmosphere, Cryosphere, Hydrosphere, etc. The facilities at SAC include highly sophisticated payload integration laboratories, electronic and mechanical fabrication facilities, environmental test facilities, systems reliability / assurance group, image processing and analysis facilities, project management support group and a well-stocked library. SAC has active collaborations with industry, academia, national and international institutes for research and development. The Centre also conducts nine-month post graduate diploma courses for students from the Asia Pacific region under the aegis of the Centre for Space Science and Technology Education (CSSTE-AP) in satellite meteorology and communication.



- title: "National Remote Sensing Centre (NRSC)"
  slug: "/about/national-remote-sensing-centre-nrsc"
  image: "../images/about/centres/nrscbuilding.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/centres/nrscbuilding.jpg"
      headPosition: "Director"
      head: "Shri Santanu Chowdhury"
      address: "National Remote Sensing Centre, Dept. of Space, Govt. Of India, Hyderabad - 500 037, Andhra Pradesh"
      email: "director@nrsc.isro.gov.in"
      link: "http://www.nrsc.gov.in/"
      description: !markdown |
        National Remote Sensing Centre (NRSC) at Hyderabad is responsible for remote sensing satellite data acquisition and processing, data dissemination, aerial remote sensing and decision support for disaster management. NRSC has a data reception station at Shadnagar near Hyderabad for acquiring data from Indian remote sensing satellites as well as others.

        NRSC Ground station at Shadnagar acquires Earth Observation data from Indian remote-sensing satellites as well as from different foreign satellites. NRSC is also engaged in executing remote sensing application projects in collaboration with the users. The Aerial Services and Digital Mapping (ASDM) Area provides end-to-end Aerial Remote Sensing services and value-added solutions for various large scale applications like aerial photography and digital mapping, infrastructure planning, scanner surveys, aeromagnetic surveys, large scale base map, topographic and cadastral level mapping, etc.

        Regional Remote Sensing Centres (RRSCs) support various remote sensing tasks specific to their regions as well as at the national level. RRSCs are carrying out application projects encompassing all the fields of natural resources. RRSCs are also, involved in software development, customisation and packaging specific to user requirements and conducting regular training programmes for users in geo-spatial technology, particularly digital image processing and Geographical Information System (GIS) applications.



- title: "ISRO Telemetry, Tracking and Command Network (ISTRAC)"
  slug: "/about/isro-telemetry-tracking-and-command-network-istrac"
  image: "../images/about/centres/istrac_img.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/centres/istrac_img.jpg"
      headPosition: "Director"
      head: "Mr. V V Srinivasan"
      address: "ISRO Telemetry Tracking and Command Network (ISTRAC), Plot No. 12 & 13, 3rd Main, 2nd phase, Peenya Industrial Area, Bengaluru – 560 058"
      email: "director@istrac.gov.in"
      link: "http://www.istrac.gov.in/"
      description: !markdown |
        ISRO Telemetry, Tracking and Command Network (ISTRAC), Bengaluru is entrusted with the major responsibility to provide tracking support for all the satellite and launch vehicle missions of ISRO. The major objectives of the centre are: carrying out mission operations of all  operational remote sensing and scientific satellites, providing Telemetry, Tracking and Command (TTC) services from launch vehicle lift-off till injection of satellite into orbit and to estimate its preliminary orbit in space and hardware and software developmental activities that enhance the capabilities of ISTRAC for providing flawless TTC and Mission Operations services. Towards, these objectives, ISTRAC has established a network of ground stations at Bengaluru, Lucknow, Mauritius, Sriharikota, Port Blair, Thiruvananthapuram, Brunei, Biak (Indonesia) and the Deep Space Network Stations.

        In keeping with its long-established TTC support responsibility, ISTRAC has also been mandated to provide space operations support for Deep Space Missions of ISRO, undertake development of radar systems for launch vehicle tracking and meteorological applications, establish and operationalise the ground segment for Indian Regional Navigational Satellite System, provide Search & Rescue and Disaster Management Services and support space based services like telemedicine, Village Resource Centre (VRC) and tele-education.




- title: "Master Control Facility (MCF)"
  slug: "/about/master-control-facility-mcf"
