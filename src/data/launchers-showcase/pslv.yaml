textContent1:
  title: "About launcher"
  text: !markdown |
    Polar Satellite Launch Vehicle (PSLV) is the third generation launch vehicle of India. It is the first Indian launch vehicle to be equipped with liquid stages. After its first successful launch in October 1994, PSLV emerged as the reliable and versatile workhorse launch vehicle of India with 39 consecutively successful missions by June 2017. During 1994-2017 period, the vehicle has launched 48 Indian satellites and 209 satellites for customers from abroad.

    PSLV earned its title ***'The Workhorse of ISRO'*** through consistently delivering various satellites to Low Earth Orbits, particularly the IRS series of satellites. Due to its unmatched reliability, PSLV has also been used to launch various satellites into Geosynchronous and Geostationary orbits, like satellites from the IRNSS constellation.

    Besides, the vehicle successfully launched two spacecraft – [Chandrayaan-1](/spacecraft/chandrayaan-1) in 2008 and [Mars Orbiter Spacecraft](/spacecraft/mars-orbiter-mission-spacecraft) in 2013 – that later traveled to Moon and Mars respectively.


carouselSections:
  - image: "../../images/launchers/pslv/integration-of-3rd-4th-stage-of-pslv-c27.jpg"
    title: "Fourth Stage: PS4"
    description: "PS4 is the fourth and final stage of PSLV and it uses two Earth storable liquid engines for propulsion. PS4 is responsible for the correct injection of PSLV's payloads into their respective desired orbits."
    table:
      body:
        - row:
          - col:
              text: "Engine"
          - col:
              text: "2 x PS-4"
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "MMH + MON"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "7.6 x 2 kN"


  - image: "../../images/launchers/pslv/integration-of-3rd-4th-stage-of-pslv-c27.jpg"
    title: "Third Stage: PS3"
    description: "The third stage of PSLV is a solid rocket motor that provides the upper stages high thrust after the atmospheric phase of the launch."
    table:
      body:
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "HTPB"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "240 kN"


  # - image: "../../images/launchers/pslv/7hoistingofpslv-c45liquidsecondstageduringvehicleintegration.jpg"
  # - image: "../../images/launchers/pslv/pslv-c20-ps2.jpg"
  - image: "../../images/launchers/pslv/pslv-c39-liquid-stage.png"
    title: "Second Stage: PS2"
    description: "PSLV uses an Earth storable liquid rocket engine for its second stage, known as the Vikas engine, developed by Liquid Propulsion Systems Centre in the early 90s."
    table:
      body:
        - row:
          - col:
              text: "Engine"
          - col:
              text: "Vikas"
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "UDMH + N204"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "799 kN"


  - image: "../../images/launchers/pslv/4fullyintegratedpslv-c45corefirststagewithoneofitsstrap-onsbyitsside.jpg"
    title: "First Stage: PS1"
    description: "PS1 is the first stage of PSLV and it provides the launcher the high thrust that is required for lift off. It uses the S139 solid rocket motor that is augmented by 6 solid strap-on boosters."
    table:
      body:
        - row:
          - col:
              text: "Engine"
          - col:
              text: "S139"
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "HTPB"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "4800 kN"


  - image: "../../images/launchers/pslv/6integrationofstrap-onmotorswithpslv-c34corestageatvehicleassemblybuilding.jpg"
    title: "Strap-on Motors"
    description: "PSLV uses 6 solid rocket strap-on motors to augment the thrust provided by the first stage in its PSLV-G and PSLV-XL variants. However, strap-ons are not used in the core alone version (PSLV-CA)."
    table:
      body:
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "HTPB"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "719 kN"



