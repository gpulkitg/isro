textContent1:
  title: "About launcher"
  text: !markdown |
    Geosynchronous Satellite Launch Vehicle Mark II (GSLV Mk II is the largest launch vehicle developed by India, which is currently in operation. This fourth generation launch vehicle is a three stage vehicle with four liquid strap-ons.

    The indigenously developed cryogenic Upper Stage (CUS, which is flight proven, forms the third stage of GSLV Mk II. From January 2014, the vehicle has achieved four consecutive successes.


carouselSections:
  - image: "../../images/launchers/gslv-mk-ii/cus_7.5.jpg"
    title: "Third Stage: CUS"
    description: "Developed under the Cryogenic Upper Stage Project (CUSP, the CE-7.5 is India's first cryogenic engine, developed by the Liquid Propulsion Systems Centre. CE-7.5 has a staged combustion operating cycle."
    table:
      body:
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "LOX + LH2"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "75 kN"
        - row:
          - col:
              text: "Burn time"
          - col:
              text: "720 sec"


  - image: "../../images/launchers/gslv-mk-ii/vikas_engine_isro.jpeg"
    title: "Second Stage: GS2"
    description: "One Vikas engine is used in the second stage of GSLV. The stage was derived from the PS2 of PSLV where the Vikas engine has proved its reliability."
    table:
      body:
        - row:
          - col:
              text: "Engine"
          - col:
              text: "Vikas"
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "UDMH + N204"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "800 kN"
        - row:
          - col:
              text: "Burn time"
          - col:
              text: "150 sec"


  - image: "../../images/launchers/gslv-mk-ii/gslv_f11_gsat_7a_6.jpg"
    title: "First Stage: GS1"
    description: "The first stage of GSLV was also derived from the PSLV's PS1. The 138 tonne solid rocket motor is augmented by 4 liquid strap-ons."
    table:
      body:
        - row:
          - col:
              text: "Engine"
          - col:
              text: "S139"
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "HTPB"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "4700 kN"
        - row:
          - col:
              text: "Burn time"
          - col:
              text: "100 sec"

  - image: "../../images/launchers/gslv-mk-ii/gslv_f11_gsat_7a_6.jpg"
    title: "Strap-on Motors"
    description: "The four liquid engine strap-ons used in GSLV are heavier derivatives of PSLV's PS2, and use one Vikas engine each."
    table:
      body:
        - row:
          - col:
              text: "Fuel"
          - col:
              text: "UDMH + N204"
        - row:
          - col:
              text: "Max thrust"
          - col:
              text: "680 kN"
        - row:
          - col:
              text: "Burn time"
          - col:
              text: "160 sec"


