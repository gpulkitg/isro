      #### Links to external websites/portals

      At many places in this website, you shall find links to other websites/portals. These links have been placed for your convenience. ISRO is not responsible for the contents and reliability of the linked websites and does not necessarily endorse the views expressed in them. Mere presence of the link or its listing on this website should not be assumed as endorsement of any kind. ISRO can neither guarantee that these links will work all the time nor it has any control over availability of linked pages. Any query regarding the contents of linked pages of external website, please contact the webmaster of the concerned website.

      #### Links to ISRO website by other websites

      ISRO does not object to linking directly to the information that is hosted on this website and no prior permission is required for the same. However, we do not permit our pages to be loaded into frames on your site. The pages belonging to this website must load into a newly opened browser window of the User.
