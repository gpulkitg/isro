      email: "director@scl.gov.in"
      link: "http://www.scl.gov.in/"
      description: !markdown |
        Semi-Conductor Laboratory (SCL) at Chandigarh, an autonomous body under DOS, is a Research & Development (R&D) Unit engaged in Design, Development, Fabrication, Assembly, Packaging, Testing & Reliability Assurance of Application Specific Integrated Circuits (ASICs) and Opto-Electronic / Imaging & Micro Electro Mechanical System (MEMS) Devices. SCL is working towards creating a strong microelectronics base in the country and enhance capabilities in Very Large Scale Integrated circuit (VLSI) domain. SCL is also engaged in Hi-Rel Board Fabrication and Component Screening for ISRO Units and Assembly of Radiosonde for Atmospheric Studies. SCL continues to strive for technological excellence in the field of semiconductor fabrication.



- title: "North Eastern-Space Applications Centre (NE-SAC)"
  slug: "/about/north-eastern-space-applications-centre-ne-sac"
  image: "../images/about/autonomous-bodies/NESAC-Building.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/autonomous-bodies/NESAC-Building.jpg"
      headPosition: "Director"
      head: "Mr. P.L.N. Raju"
      address: "North Eastern Space Applications Centre (NE-SAC), Umiam - 793103, Ri Bhoi District, Meghalaya, India"
      email: "director@nesac.gov.in"
      link: "http://www.nesac.gov.in/"
      description: !markdown |
        North Eastern-Space Applications Centre (NE-SAC), located at Shillong, is a joint initiative of DOS and North Eastern Council (NEC) to provide developmental support to the North Eastern Region (NER) using space science and technology. The centre has the mandate to develop high technology infrastructure support to play the catalytic role in holistic development of NER of India by providing space science and technology support.

        The centre also coordinates with the State Remote Sensing Application Centres of NER and acts as a nodal centre for implementation of major national and regional programmes on natural resource management, infrastructure planning, healthcare, education, emergency communication, early warnings for disaster management support and atmospheric science research. The centre has completed a number of applications projects sponsored by the user agencies in the region and taken up research and development projects under Earth Observation Applications Mission, ISRO Geo-sphere Biosphere Programme, Satellite Communications, Disaster Management Support and Space Science Programmes.




- title: "Indian Institute of Space Science and Technology (IIST)"
  slug: "/about/indian-institute-of-space-science-and-technology-iist"
  image: "../images/about/autonomous-bodies/Hostel-Building-at-new-IIST-Campus.jpg"
  description: ""
  locations:
    - name: ""
      image: "../images/about/autonomous-bodies/Hostel-Building-at-new-IIST-Campus.jpg"
      headPosition: "Director"
      head: "Dr. V.K. Dahwal"
      address: "Indian Institute of Space Science and Technology, Valiamala P O, Thiruvananthapuram - 695547"
      email: "director@iist.ac.in"
      link: "http://www.iist.ac.in/"
      description: !markdown |
        Indian Institute of Space Science and Technology (IIST), Asia’s first Space University, was established at Thiruvananthapuram in 2007 with the objective of offering high quality education in space science and technology to meet the demands of Indian Space Programme. The institute offers undergraduate, postgraduate, doctoral and post-doctoral programmes in broad areas of space science, technology and applications. The institute is committed to excellence in teaching, learning and research. IIST fosters state-of-the-art research and development in space studies and provides a think-tank to explore new directions for the Indian Space Programme.

        The Institute has faculty strength of nearly 100 spread across seven Departments. IIST is a residential institution located at Valiamala, approximately 20 km from Thiruvananthapuram city.



