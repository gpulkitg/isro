            - col: "75 kN"
          - row:
            - col: "Burn time"
            - col: "720 sec"


    - image: "../images/launchers/gslv-mk-ii/vikas_engine_isro.jpeg"
      title: "Second Stage: GS2"
      description: "One Vikas engine is used in the second stage of GSLV. The stage was derived from the PS2 of PSLV where the Vikas engine has proved its reliability."
      table:
