            - col: "150 sec"


    - image: "../images/launchers/gslv-mk-ii/gslv_f11_gsat_7a_6.jpg"
      title: "First Stage: GS1"
      description: "The first stage of GSLV was also derived from the PSLV's PS1. The 138 tonne solid rocket motor is augmented by 4 liquid strap-ons."
      table:
