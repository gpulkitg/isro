  textContent1:
    title: "Indian Launch Vehicles"
    text: !markdown |
        Launchers or Launch Vehicles are used to carry spacecraft to space. India has two operational launchers: [Polar Satellite Launch Vehicle (PSLV)](/launchers/pslv) and [Geosynchronous Satellite Launch Vehicle (GSLV)](/launchers/gslv-mk-ii)

        GSLV with indigenous Cryogenic Upper Stage has enabled the launching up to 2 tonne class of communication satellites. The next variant of GSLV is GSLV Mk III, with indigenous high thrust cryogenic engine and stage, having the capability of launching 4 tonne class of communication satellites.

  splitSection:
    - image: "../images/launchers/pslv_c44.jpg"
      title: "PSLV"
      subtitle: ""
      description: "Polar Satellite Launch Vehicle was developed to launch Low Earth Orbit satellites into Polar and Sun Synchronous Orbits. It has since proved its versatility by launching Geosynchronous, Lunar and Interplanetary spacecraft successfully."
      button: "MORE INFO"
      link: "/launchers/pslv"
