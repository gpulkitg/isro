  textContent2:
    title: "Launch Facilities"
    text: !markdown |
          In order to achieve high accuracy in placing satellites into their orbits, a combination of accuracy, efficiency, power and immaculate planning are required. ISRO's Launch Vehicle Programme spans numerous centres and employs over 5,000 people.

          [Vikram Sarabhai Space Centre](http://www.vssc.gov.in), located in Thiruvananthapuram, is responsible for the design and development of launch vehicles.

          [Liquid Propulsion Systems Centre](http://www.lpsc.gov.in) and [ISRO Propulsion Complex](/about/isro-propulsion-complex), located at Valiamala and Mahendragiri respectively, develop the liquid and cryogenic stages for these launch vehicles.

          [Satish Dhawan Space Centre, SHAR](/about/satish-dhawan-space-centre-sdsc-shar), is the space port of India and is responsible for integration of launchers. It houses two operational launch pads from where all GSLV and PSLV flights take place.
