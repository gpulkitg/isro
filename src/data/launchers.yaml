      subtitle: ""
      description: "ISRO launches smaller rockets from the Rohini series on suborbital and atmospheric flights for aeronomy and meteorological studies. ATV, ISRO's heaviest sounding rocket, can be used for microgravity experiments and for precursor experiments to characterise new technologies."
      button: "MORE INFO"
      link: "/launchers/sounding-rockets"
