    - image: "../images/launchers/gslv_f11_gsat_7a.jpg"
      title: "GSLV"
      subtitle: ""
      description: "Geosynchronous Satellite Launch Vehicle was developed to launch the heavier INSAT class of Geosynchronous satellites into orbit. In its third and final stage, GSLV uses the indigenously developed Cryogenic Upper Stage."
      button: "MORE INFO"
      link: "/launchers/gslv-mk-ii"
      textPosition: "right"
      textAlignment: "center"
      objectFit: "cover"

    - image: "../images/launchers/sounding_rocket.jpg"
