    - image: "../images/launchers/gslv-mk-ii/gslv_f11_gsat_7a_6.jpg"
      title: "Strap-on Motors"
      description: "The four liquid engine strap-ons used in GSLV are heavier derivatives of PSLV's PS2, and use one Vikas engine each."
