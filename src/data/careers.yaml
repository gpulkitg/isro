  post: "Scientist/Engineer 'SC' (Electronics, Mechanical and Computer Science)"
  link: "#"
  deadline: ""
  remarks: !markdown |
    1. In Electronics, as sufficient number of candidates have not qualified the written test, candidates who secured atleast 60% of the marks scored by the topper have been short-listed additionally for interview, as per extant norms.

    2. In Mechanical stream, considering the number of vacancies and the number of candidates who qualified the written test, candidates have been short-listed for interview in the ratio of 1:5.


