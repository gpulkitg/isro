      The Physical Research Laboratory (PRL), Ahmedabad is an autonomous unit of DOS and a premier research institute engaged in basic research in the areas of Astronomy and Astrophysics, Solar Physics, Planetary Science and Exploration, Space and Atmospheric Sciences, Geosciences, Theoretical Physics, Atomic, Molecular and Optical Physics and Astro-chemistry.

      PRL is actively participating in planetary exploration programme and significant progress has been made in the areas of planetary sciences and exploration. Studies of stellar and solar astronomy are conducted from the Infra-red Observatory at Mt. Abu, and a lake site Solar Observatory in Udaipur, respectively. Another campus at Thaltej, Ahmedabad, hosts the planetary exploration (PLANEX) programme.
