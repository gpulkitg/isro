      Indian Institute of Space Science and Technology (IIST), Asia’s first Space University, was established at Thiruvananthapuram in 2007 with the objective of offering high quality education in space science and technology to meet the demands of Indian Space Programme. The institute offers undergraduate, postgraduate, doctoral and post-doctoral programmes in broad areas of space science, technology and applications. The institute is committed to excellence in teaching, learning and research. IIST fosters state-of-the-art research and development in space studies and provides a think-tank to explore new directions for the Indian Space Programme.

      The Institute has faculty strength of nearly 100 spread across seven Departments. IIST is a residential institution located at Valiamala, approximately 20 km from Thiruvananthapuram city.
