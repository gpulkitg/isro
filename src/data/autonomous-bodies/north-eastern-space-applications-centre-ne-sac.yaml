      North Eastern-Space Applications Centre (NE-SAC), located at Shillong, is a joint initiative of DOS and North Eastern Council (NEC) to provide developmental support to the North Eastern Region (NER) using space science and technology. The centre has the mandate to develop high technology infrastructure support to play the catalytic role in holistic development of NER of India by providing space science and technology support.

      The centre also coordinates with the State Remote Sensing Application Centres of NER and acts as a nodal centre for implementation of major national and regional programmes on natural resource management, infrastructure planning, healthcare, education, emergency communication, early warnings for disaster management support and atmospheric science research. The centre has completed a number of applications projects sponsored by the user agencies in the region and taken up research and development projects under Earth Observation Applications Mission, ISRO Geo-sphere Biosphere Programme, Satellite Communications, Disaster Management Support and Space Science Programmes.
