  textContent2:
    title: "Launches till Date"
    text: !markdown |
      The first experimental flight of LVM3, the [LVM3-X/CARE](/launchers/lvm3-x-care) mission lifted off from Sriharikota on December 18, 2014 and successfully tested the atmospheric phase of flight. Crew module Atmospheric Reentry Experiment was also carried out in this flight. The module reentered, deployed its parachutes as planned and splashed down in the Bay of Bengal.

      The first developmental flight of GSLV Mk III, the [GSLV-Mk III-D1](launcher/gslv-mk-iii-d1-gsat-19-mission) successfully placed GSAT-19 satellite to a Geosynchronous Transfer Orbit (GTO) on June 05, 2017 from SDSC SHAR, Sriharikota.

      [GSLV MkIII-D2](/launcher/gslv-mk-iii-d2-gsat-29-mission), the second developmental flight of GSLV MkIII successfully launched GSAT-29, a high throughput communication satellite on November 14, 2018 from Satish Dhawan Space Centre SHAR, Sriharikota

      [GSLV MkIII-M1](/launcher/gslv-mk-iii-m1-chandrayaan-2-mission), successfully injected Chandrayaan-2, India’s second Lunar Mission, in to Earth Parking Orbit on July 22, 2019 from Satish Dhawan Space Centre SHAR, Sriharikota

