    description: !markdown |
      The Development and Educational Communication Unit (DECU) at Ahmedabad, is dedicated for realizing satellite communication based societal applications in the country. The major activities of DECU are – SATCOM networks configuration, implementation, upgradation, migration, utilisation, sustenance, social research and evaluation, Programme production and transmission and Training. It works with user agencies and experiments with innovative configurations to meet their requirements and facilitates in covering the ‘last mile’ in space applications to reach the unreached.

      The major programmes carried out by DECU include Telemedicine (TM), Tele-Education (TE), Projects resulted as an outcome of the national meet of space technology and tools and other SATCOM based applications for the national development.
